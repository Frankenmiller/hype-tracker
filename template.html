<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hype Tracker Digest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-1">🤖 Hype Tracker</h1>
        <p class="text-zinc-500 mb-8 font-mono text-sm">Last compiled: {{ compiled_at }}</p>
        
        <div class="grid gap-4">
            {% for item in sorted_archive %}
            <a href="{{ item.url }}" target="_blank" class="block bg-zinc-900 border border-zinc-800 rounded-xl p-5 hover:border-emerald-500 transition-colors">
                <h2 class="text-lg font-semibold text-zinc-100 mb-2">{{ item.title }}</h2>
                <p class="text-sm text-zinc-400 mb-3">{{ item.reason }}</p>
                <span class="text-xs text-emerald-500 font-mono">{{ item.get('discovered_at', 'Unknown') }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
