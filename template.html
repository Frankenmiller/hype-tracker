<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hype Tracker Digest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-1">🤖 Hype Tracker</h1>
        <p class="text-zinc-500 mb-6 font-mono text-sm">Last compiled: {{ compiled_at }}</p>
        
        <div class="mb-8">
            <input type="text" id="searchInput" placeholder="Search titles, reasons, or categories..." 
                   class="w-full px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-emerald-500 font-mono text-sm transition-colors">
        </div>

        <div class="grid gap-4" id="cardsGrid">
            {% for item in sorted_archive %}
            <div id="tracker-card" 
                 data-search="{{ (item.title ~ ' ' ~ item.reason ~ ' ' ~ item.category)|lower }}"
                 class="relative bg-zinc-900 border border-zinc-800 rounded-xl p-5 hover:border-emerald-500/50 transition-colors group flex flex-col justify-between min-h-[180px]">
                <div>
                    <div class="flex items-start justify-between gap-4 mb-2">
                        <a href="{{ item.url }}" target="_blank" class="text-lg font-semibold text-zinc-100 hover:text-emerald-400 hover:underline transition-colors decoration-2 underline-offset-4">
                            {{ item.title }}
                        </a>
                        
                        <div class="flex items-center gap-2">
                            <button onclick="navigator.clipboard.writeText('{{ item.url }}'); alert('Copied link!');" 
                                    class="p-1.5 rounded-md bg-zinc-800 text-zinc-400 hover:text-white hover:bg-zinc-700 transition-colors" 
                                    title="Copy Link">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                                </svg>
                            </button>

                            {% if item.category %}
                            <span class="px-2.5 py-1 text-xs font-medium rounded-md bg-zinc-800 text-zinc-300 border border-zinc-700 font-mono uppercase tracking-wider whitespace-nowrap">
                                {{ item.category }}
                            </span>
                            {% endif %}
                        </div>
                    </div>
                    
                    <p class="text-sm text-zinc-400 mb-6">{{ item.reason }}</p>
                </div>
                
                <div class="flex items-center justify-between border-t border-zinc-800/60 pt-3 text-xs font-mono">
                    <span class="text-zinc-500">{{ item.get('discovered_at', 'Unknown') }}</span>
                    
                    <div class="flex items-center gap-3 text-zinc-400">
                        <span class="text-[10px] text-zinc-600 uppercase tracking-widest mr-1">Pivot:</span>
                        
                        <a href="https://x.com/search?q={{ item.title|urlencode }}" target="_blank" class="hover:text-white transition-colors" title="Search X">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
                            </svg>
                        </a>

                        <a href="https://github.com/search?q={{ item.title|urlencode }}&type=repositories" target="_blank" class="hover:text-emerald-400 transition-colors" title="Search GitHub">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
                                <path d="M9 18c-4.51 2-5-2-7-2"/>
                            </svg>
                        </a>

                        <a href="https://www.google.com/search?q={{ item.title|urlencode }}" target="_blank" class="hover:text-blue-400 transition-colors" title="Search Google">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><path d="m21 21-4.3-4.3"/>
                            </svg>
                        </a>
                    </div>
                </div>

            </div>
                
                <span class="text-xs text-emerald-500 font-mono">{{ item.get('discovered_at', 'Unknown') }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
